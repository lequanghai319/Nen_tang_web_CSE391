<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Câu A2</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; line-height: 1.6; }
        h2.title { color: #333; border-bottom: 2px solid #ccc; padding-bottom: 10px; }

        #app { background-color: #f9f9f9; padding: 20px; border-radius: 8px; }


        h1 { background-color: yellow; } 

        .price { color: red; font-weight: bold; } 

      
        #app header { border: 3px dashed blue; padding: 15px; } 

     
        nav a:first-child { background-color: lightgreen; } 

        .product.featured h2 { text-decoration: underline wavy purple; } 
      
        article > p { border-left: 4px solid orange; padding-left: 10px; } 

        a[href="/"] { outline: 2px solid magenta; } 

        .top-bar.dark h1 { border: 3px solid darkgreen; color: darkgreen; } 
    </style>
</head>
<body>
    <h2 class="title">Câu A2 - Lê Quang Hải</h2>
    
    <div id="app">
        <header class="top-bar dark">
            <h1>ShopTLU</h1>
            <nav>
                <a href="/" class="active">Home</a>
                <a href="/products">Products</a>
                <a href="/about">About</a>
            </nav>
        </header>
        <main>
            <article class="product">
                <h2>iPhone 16</h2>
                <p class="price">25.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
            <article class="product featured">
                <h2>MacBook Pro</h2>
                <p class="price">45.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
        </main>
    </div>
</body>
</html>
