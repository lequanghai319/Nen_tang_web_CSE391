<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Debug Layout - Câu C1</title>
    <link rel="stylesheet" href="debug_layout.css">
</head>
<body>
    <h2>Layout gốc (Bị vỡ)</h2>
    <div class="container broken">
        <div class="sidebar">Sidebar (300px)</div>
        <div class="content">Content (660px)</div>
    </div>

    <h2>Cách 1: Sửa bằng border-box (Khuyên dùng)</h2>
    <div class="container fix-border-box">
        <div class="sidebar">Sidebar (300px)</div>
        <div class="content">Content (660px)</div>
    </div>

    <h2>Cách 2: Sửa bằng cách trừ lùi Width thủ công</h2>
    <div class="container fix-manual-width">
        <div class="sidebar">Sidebar (258px)</div>
        <div class="content">Content (598px)</div>
    </div>
</body>
</html>
